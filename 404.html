<!doctype html>
<html lang="en">
  <head>
    <!-- Character encoding fro proper text display -->
    <meta charset="UTF-8" />
    <meta http-equiv="refresh" content="3; url=home.html" />
    <!-- Responsive viewport setting for mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Page not found - Redirecting to Quiz App home page"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="assets/favicon/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="assets/favicon/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="assets/favicon/favicon-16x16.png"
    />
    <!-- link to external CSS -->
    <link rel="stylesheet" href="assets/css/style.css" />
    <!-- Page title -->
    <title>404 - Page Not Found | Quiz App</title>
  </head>
  <body>
    <!-- Navigation Bar (minimal for 404 page) -->
    <nav class="navbar">
      <div class="nav-container">
        <div class="logo">
          <a href="home.html">
            <img
              src="assets/images/quiz-icon.svg"
              alt="Quiz App Logo"
              class="nav-logo"
            />
            <span class="logo-text">Quiz App</span></a
          >
        </div>
      </div>
    </nav>

    <!-- 404 Content -->
    <div class="not-found">
      <h1>404</h1>
      <h2>Page Not Found</h2>
      <p class="redirect-message">
        The page you are looking for does not exist or has been moved.
      </p>
      <p class="redirect-message">
        Redirecting you to the home page in
        <span id="countdown">3</span> seconds...
      </p>
      <a href="home.html" class="cta-button">Go to Home Page now</a>
    </div>

    <!-- Countdown Script -->
    <script>
      let seconds = 3;
      const countdownEl = document.getElementById("countdown");

      const interval = setInterval(() => {
        seconds--;
        if (countdownEl) {
          countdownEl.textContent = seconds;
        }
        if (seconds <= 0) {
          clearInterval(interval);
          window.location.href = "home.html";
        }
      }, 1000);
    </script>
  </body>
</html>
